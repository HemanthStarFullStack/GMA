name: CI

# Validate every push / PR to main: typecheck + production build.
# Runs on GitHub's free hosted runners — no infrastructure, no cost.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Dummies so import-time checks pass; no real secrets needed to compile.
          MONGODB_URI: mongodb://build:build@localhost:27017/build
          AUTH_SECRET: build-time-placeholder-secret
          NEXT_TELEMETRY_DISABLED: "1"
