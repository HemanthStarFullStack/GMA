services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: gma:latest
    container_name: gma-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Load secrets straight from .env into the container. This is the source of
    # truth for GROQ_API_KEY et al — do NOT also list them under `environment`
    # with ${...} shell substitution, or a stale shell/session value silently
    # shadows .env and a recreate re-bakes a dead key (happened: old key kept
    # resurrecting on every restart). env_file reads the FILE, never the shell.
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # App talks to the mongodb service over the compose network.
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-changeme}@mongodb:27017/${MONGO_DB:-gma}?authSource=admin
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ADMIN_SECRET: ${ADMIN_SECRET:-}
      # Internal OCR sidecar (label scanning) — reached over the compose network.
      OCR_URL: ${OCR_URL:-http://ocr:4000}
      # Optional higher-quality label reader: PaddleOCR-VL served by llama-server
      # on the host (GPU). Empty disables it -> the app uses the PP-OCRv5 sidecar.
      VISION_OCR_URL: ${VISION_OCR_URL:-http://host.docker.internal:8185}
      # Local-LLM fallback: by default use Ollama running on the host machine.
      # Set LOCAL_LLM_ENABLED=false to disable the tier entirely.
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      LOCAL_LLM_ENABLED: ${LOCAL_LLM_ENABLED:-true}
      # Small LLM that structures OCR text into brand/name/flavor (label parser).
      # Primary = Groq (free, fast, gpt-oss-120b); falls back to the local Ollama
      # struct model below if no key / rate-limited / unreachable.
      # GROQ_API_KEY + GROQ_MODEL come from env_file (.env) above — intentionally
      # NOT redeclared here, so a stale shell ${GROQ_API_KEY} can't shadow them.
      OLLAMA_STRUCT_MODEL: ${OLLAMA_STRUCT_MODEL:-qwen2.5:1.5b}
      LABEL_LLM_ENABLED: ${LABEL_LLM_ENABLED:-true}
    extra_hosts:
      # Lets the container reach the host's Ollama on Linux too.
      - "host.docker.internal:host-gateway"
    volumes:
      # Persist user uploads across restarts.
      - gma_uploads:/app/public/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      # Only "started", not "healthy": if OCR is down, scanning degrades to
      # manual entry rather than taking the whole app offline.
      ocr:
        condition: service_started

  # Internal OCR sidecar — PP-OCRv5 (ONNX) for label scanning. CPU-only, free,
  # no external API. Not published to the host; only the app reaches it.
  ocr:
    build: ./ocr
    image: gma-ocr:latest
    container_name: gma-ocr
    restart: unless-stopped
    expose:
      - "4000"

  mongodb:
    image: mongo:7.0
    container_name: gma-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-gma}
    # Not published to the host — the app reaches it over the compose network.
    # Use the `dev` profile's mongo-express, or add a port mapping, for access.
    expose:
      - "27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional DB admin UI — only starts with:  docker compose --profile dev up
  mongo-express:
    image: mongo-express:latest
    container_name: gma-mongo-express
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-changeme}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-changeme}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  # Persistent store for user uploads (public/uploads).
  gma_uploads:
    driver: local
